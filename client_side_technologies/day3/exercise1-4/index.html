<!DOCTYPE html>
<html>

<head>
  <title>Tables</title>
</head>

<body>
  <table border="1">
    <caption>Students Information</caption>
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
        <th>Subjects</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Ahmed</td>
        <td>22</td>
        <td>Cairo</td>
        <td rowspan="2">math</td>
      </tr>
      <tr>
        <td>Sara</td>
        <td>21</td>
        <td>Giza</td>
      </tr>
      <tr>
        <td>Omar</td>
        <td>23</td>
        <td>Alex</td>
        <td>Programming</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">Total Students : 3</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
